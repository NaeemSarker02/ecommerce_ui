<section class="page-container py-6">
  <div class="newsletter-shell newsletter-home-shell" data-reveal="rise" data-reveal-delay="80">
    <div class="newsletter-inline-meta" data-reveal="rise" data-reveal-delay="120">
      <span class="store-business-badge">Store updates</span>
      <span class="newsletter-meta-pill">Curated offers</span>
      <span class="newsletter-meta-pill">New arrivals</span>
    </div>
    <div class="newsletter-copy" data-reveal="rise" data-reveal-delay="150">
      <p class="section-kicker" data-newsletter-kicker>Stay Updated</p>
      <h2 class="text-3xl font-semibold text-body" data-newsletter-title>Get offers and product updates from this store.</h2>
      <p class="text-muted max-w-2xl text-sm" data-newsletter-description>Join the store mailing list for launch drops, daily deals, and useful shopping updates.</p>
    </div>
    <form class="newsletter-form" data-newsletter-form data-reveal="rise" data-reveal-delay="190">
      <input class="input-shell" data-newsletter-email type="email" name="email" placeholder="Enter your email" aria-label="Email address" title="Email address">
      <button class="primary-button" type="submit"><span data-newsletter-button-label>Join Newsletter</span></button>
    </form>
    <p class="validation-note" data-newsletter-status>We only use this for storefront updates and curated offers.</p>
  </div>
</section>
