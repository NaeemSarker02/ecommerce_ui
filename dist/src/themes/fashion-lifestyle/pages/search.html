<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion and Lifestyle Search</title>
    <script type="module" crossorigin src="/assets/app-CwSyhzsL.js"></script>
    <script type="module" crossorigin src="/assets/shared-page-data-uGVOH9zA.js"></script>
    <script type="module" crossorigin src="/assets/listing-DmW0jOiK.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/app-BgiWfn2X.css">
    <link rel="stylesheet" crossorigin href="/assets/theme-Cmekq_y4.css">
  </head>
  <body data-theme="fashion-lifestyle" data-tenant-config="/src/data/tenants/demo-fashion.json">
    <div data-partial="/src/shared/partials/header.html"></div>
    <div data-partial="/src/shared/partials/mobile-menu.html"></div>
    <main class="section-shell">
      <section class="page-container theme-page-intro">
        <div class="listing-intro-shell">
          <div class="listing-intro-copy">
            <p class="section-kicker">Search Products</p>
            <h1 class="text-4xl font-semibold" data-listing-title>Shop All</h1>
            <p class="text-muted max-w-2xl" data-listing-description>Browse our complete collection of curated lifestyle and apparel products.</p>
          </div>
          <form class="listing-search-row max-w-2xl" data-search-form role="search">
            <label class="listing-search-field" aria-label="Search products">
              <svg class="listing-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="11" cy="11" r="7"></circle>
                <path d="m20 20-3.5-3.5"></path>
              </svg>
              <input class="input-shell" data-search-input name="q" placeholder="Search collections and products" aria-label="Search products" title="Search products" enterkeyhint="search" autocomplete="off">
              <button class="listing-search-clear" type="button" data-search-clear hidden aria-label="Clear search">Clear</button>
            </label>
            <button class="primary-button listing-search-submit" type="submit">
              <svg class="listing-search-submit-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="11" cy="11" r="7"></circle>
                <path d="m20 20-3.5-3.5"></path>
              </svg>
              <span>Search</span>
            </button>
            <p class="listing-search-helper">Search collections, edits, brands, materials, or product names.</p>
          </form>
        </div>
      </section>
      <section class="page-container listing-stack">
        <div class="listing-panel">
          <div class="listing-toolbar text-sm">
            <p class="listing-toolbar-count" data-results-count>Showing 0 products</p>
            <div class="listing-sort-row">
              <span class="listing-sort-label">Sort by</span>
              <select class="select-shell" data-sort-select aria-label="Sort products" title="Sort products">
                <option value="default">Newest</option>
                <option value="price-asc">Price: Low to High</option>
                <option value="price-desc">Price: High to Low</option>
                <option value="name">Name</option>
              </select>
            </div>
          </div>
          <div class="product-grid-default" data-product-grid></div>
        </div>
      </section>
      <div data-partial="/src/shared/partials/whatsapp-cta.html"></div>
    </main>
    <div data-partial="/src/shared/partials/footer.html"></div>
  </body>
</html>
