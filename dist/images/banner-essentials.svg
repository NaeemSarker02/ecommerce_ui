<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Essentials banner</title>
  <desc id="desc">Bright essentials and care banner for daily purchase themes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfccb"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" rx="48" fill="url(#bg)"/>
  <rect x="88" y="104" width="506" height="510" rx="44" fill="#ffffff" opacity="0.9"/>
  <circle cx="988" cy="180" r="148" fill="#fdba74" opacity="0.65"/>
  <circle cx="1080" cy="532" r="176" fill="#bef264" opacity="0.6"/>
  <text x="140" y="224" fill="#15803d" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">DAILY DEALS</text>
  <text x="140" y="310" fill="#14532d" font-size="80" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Everyday</text>
  <text x="140" y="394" fill="#14532d" font-size="80" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Essentials</text>
  <text x="140" y="470" fill="#4b5563" font-size="30" font-family="Segoe UI, Arial, sans-serif">Fast-buy storefront blocks for care, hygiene,</text>
  <text x="140" y="512" fill="#4b5563" font-size="30" font-family="Segoe UI, Arial, sans-serif">grocery, and replenishment orders.</text>
  <rect x="140" y="548" width="248" height="58" rx="29" fill="#15803d"/>
  <text x="188" y="586" fill="#ffffff" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">View Essentials</text>
</svg>