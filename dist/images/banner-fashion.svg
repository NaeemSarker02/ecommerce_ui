<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Fashion banner</title>
  <desc id="desc">Editorial style banner for fashion storefront preview.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#f5d0fe"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" rx="48" fill="url(#bg)"/>
  <circle cx="960" cy="170" r="160" fill="#f9a8d4" opacity="0.45"/>
  <circle cx="1080" cy="560" r="170" fill="#e9d5ff" opacity="0.7"/>
  <rect x="92" y="104" width="500" height="510" rx="56" fill="#ffffff" opacity="0.88"/>
  <text x="144" y="224" fill="#be185d" font-size="24" font-family="Georgia, Times New Roman, serif" font-weight="700">SEASONAL EDIT</text>
  <text x="144" y="316" fill="#111827" font-size="82" font-family="Georgia, Times New Roman, serif" font-weight="700">Curated</text>
  <text x="144" y="402" fill="#111827" font-size="82" font-family="Georgia, Times New Roman, serif" font-weight="700">Stories</text>
  <text x="144" y="476" fill="#6b7280" font-size="30" font-family="Segoe UI, Arial, sans-serif">Soft editorial rhythm for lifestyle, beauty,</text>
  <text x="144" y="518" fill="#6b7280" font-size="30" font-family="Segoe UI, Arial, sans-serif">and fashion collections.</text>
  <rect x="144" y="552" width="244" height="58" rx="29" fill="#111827"/>
  <text x="198" y="590" fill="#ffffff" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Explore Edit</text>
</svg>